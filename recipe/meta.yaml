{% set versions = {
    "2.0.9": "6ffbd371658726054b903dce9a7855ac02b258eac59e2ee13524dda9e278f23b"
} %}


{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', "qcdloop")|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  url: "https://github.com/scarrazza/qcdloop/archive/refs/tags/{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}


build:
  # src/qcdloop/types.h hard-includes <quadmath.h> for its extended-
  # precision "qdouble" type; conda-forge's aarch64 GCC doesn't ship
  # libquadmath (x86-only), and there's no portable substitute short of
  # rewriting qcdloop's quad-precision code -- linux-64 only for now.
  skip: true  # [aarch64]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('gfortran') }}
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}

    - cmake
    - make
    - sed        # build.sh's `sed -i` needs GNU semantics; BSD sed on macOS differs

about:
  home: "https://github.com/scarrazza/qcdloop"
  license: "GPL-3.0"
  summary: "Object-oriented one-loop scalar Feynman integrals framework"

extra:
  recipe-maintainers:
    - meiyasan

{% set versions = {
    "1.98": "697f1ff5bcb3a19066f1a451db22062b96f3fb854994a7635473c2dfb4149b9f"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', "qcdloop")|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  # qcdloop.fnal.gov blocks conda-build's downloader (Cloudflare 403s the
  # requests-library user agent) -- mirrored as a GitHub release asset instead
  url: "https://github.com/hep-forge/qcdloop-feedstock/releases/download/source-mirror-{{ version }}/QCDLoop-{{ version }}.tar.gz"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('gfortran') }}
    - make
    - libtool

test:
  commands:
    - test -f $PREFIX/lib/libqcdloop.a
    - test -f $PREFIX/include/ql/qldiffi2.mod

about:
  home: "https://qcdloop.fnal.gov/"
  license: "MIT"
  summary: "QCDLoop: one-loop scalar Feynman integrals (original Fortran line, Ellis & Zanderighi)"
  description: |
    The original Fortran QCDLoop by Ellis and Zanderighi, evaluating
    one-loop scalar Feynman integrals close to four dimensions. This is
    the legacy line -- same underlying software as hep-forge's `qcdloop`
    on the main label, which is Carrazza's later C++ rewrite. Published
    under the "legacy" Anaconda label since MCFM/xFitter-era codes still
    depend on this exact Fortran API.

extra:
  recipe-maintainers:
    - meiyasan
